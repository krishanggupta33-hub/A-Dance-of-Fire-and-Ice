<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire & Ice - One Key</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            text-shadow: 0 0 5px white;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="scoreDisplay">Score: 0</h1>
        <p>Press [SPACE] when the orbiting circle aligns with the next tile.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const TILE_SIZE = 60;
        const ORBIT_SPEED = 0.05;
        const HIT_TOLERANCE = 0.4; // Radians of forgiveness

        let path = [];
        let pivotIndex = 0;
        let currentAngle = Math.PI; 
        let isRedPivot = true; // Swaps between Red (Fire) and Blue (Ice)
        
        let score = 0;
        let gameOver = false;
        let camera = { x: 0, y: 0 };

        // Generate a random path of tiles (Right, Up, or Down)
        function generatePath() {
            path = [{ x: 0, y: 0 }];
            let cx = 0, cy = 0;
            for (let i = 0; i < 100; i++) {
                let dir = Math.random();
                if (dir < 0.5 || i < 3) {
                    cx += TILE_SIZE; // Right
                } else if (dir < 0.75) {
                    cy -= TILE_SIZE; // Up
                } else {
                    cy += TILE_SIZE; // Down
                }
                path.push({ x: cx, y: cy });
            }
        }

        function resetGame() {
            generatePath();
            pivotIndex = 0;
            currentAngle = Math.PI;
            isRedPivot = true;
            score = 0;
            gameOver = false;
            updateScore();
        }

        function updateScore() {
            if (gameOver) {
                scoreDisplay.innerText = `GAME OVER! Score: ${score}. Press SPACE to restart.`;
            } else {
                scoreDisplay.innerText = `Score: ${score}`;
            }
        }

        // Helper to keep angles between 0 and 2PI
        function normalizeAngle(a) {
            let res = a % (Math.PI * 2);
            if (res < 0) res += Math.PI * 2;
            return res;
        }

        // --- THE ONE KEY LOGIC ---
        function pressKey() {
            if (gameOver) {
                resetGame();
                return;
            }

            let pivotTile = path[pivotIndex];
            let nextTile = path[pivotIndex + 1];

            if (!nextTile) return; // End of path

            // Calculate the exact angle from the pivot to the next tile
            let targetAngle = Math.atan2(nextTile.y - pivotTile.y, nextTile.x - pivotTile.x);
            
            // Calculate the difference between current orbit angle and target angle
            let diff = Math.abs(normalizeAngle(currentAngle) - normalizeAngle(targetAngle));
            if (diff > Math.PI) diff = (Math.PI * 2) - diff; // Get shortest distance

            if (diff < HIT_TOLERANCE) {
                // HIT! Move forward
                pivotIndex++;
                score++;
                isRedPivot = !isRedPivot;
                
                // The new starting angle is exactly opposite the target angle
                currentAngle = targetAngle + Math.PI;
                updateScore();
            } else {
                // MISS!
                gameOver = true;
                updateScore();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') pressKey();
        });
        window.addEventListener('mousedown', pressKey);
        window.addEventListener('touchstart', pressKey);

        // Main Game Loop
        function loop() {
            // Update Logic
            if (!gameOver) {
                currentAngle += ORBIT_SPEED;
            }

            let pivotTile = path[pivotIndex];
            
            // Smooth Camera Follow
            camera.x += (pivotTile.x - canvas.width / 4 - camera.x) * 0.1;
            camera.y += (pivotTile.y - canvas.height / 2 - camera.y) * 0.1;

            // Draw
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 1. Draw the Path
            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            path.forEach(tile => {
                ctx.fillRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                ctx.strokeRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
            });

            // 2. Calculate Orb Positions
            let orbiterX = pivotTile.x + Math.cos(currentAngle) * TILE_SIZE;
            let orbiterY = pivotTile.y + Math.sin(currentAngle) * TILE_SIZE;

            let redPos = isRedPivot ? pivotTile : { x: orbiterX, y: orbiterY };
            let bluePos = isRedPivot ? { x: orbiterX, y: orbiterY } : pivotTile;

            // 3. Draw Orbit Guide Ring
            ctx.beginPath();
            ctx.arc(pivotTile.x, pivotTile.y, TILE_SIZE, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 4. Draw Orbs
            // Red (Fire)
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(redPos.x, redPos.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Blue (Ice)
            ctx.fillStyle = '#44ccff';
            ctx.beginPath();
            ctx.arc(bluePos.x, bluePos.y, 15, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
            requestAnimationFrame(loop);
        }

        // Start
        resetGame();
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
