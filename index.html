<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire & Ice - Rhythm Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            text-shadow: 0 0 5px white;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #fff;
            color: #111;
            border: none;
            cursor: pointer;
            pointer-events: auto;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="scoreDisplay">Score: 0</h1>
    </div>
    
    <button id="startBtn">START GAME & MUSIC</button>
    
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const startBtn = document.getElementById('startBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const TILE_SIZE = 60;
        let BPM = 120; 
        let ORBIT_SPEED = (BPM * Math.PI) / 3600;
        const HIT_TOLERANCE = 0.4;

        let bgMusic = new Audio('track.mp3');
        
        let path = [];
        let pivotIndex = 0;
        let currentAngle = Math.PI; 
        let isRedPivot = true; 
        
        let score = 0;
        let gameOver = false;
        let isPlaying = false;
        let camera = { x: 0, y: 0 };

        function generatePath() {
            path = [{ x: 0, y: 0 }];
            let cx = 0, cy = 0;
            for (let i = 0; i < 100; i++) {
                let dir = Math.random();
                if (dir < 0.5 || i < 3) {
                    cx += TILE_SIZE;
                } else if (dir < 0.75) {
                    cy -= TILE_SIZE;
                } else {
                    cy += TILE_SIZE;
                }
                path.push({ x: cx, y: cy });
            }
        }

        function resetGame() {
            generatePath();
            pivotIndex = 0;
            currentAngle = Math.PI;
            isRedPivot = true;
            score = 0;
            gameOver = false;
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function normalizeAngle(a) {
            let res = a % (Math.PI * 2);
            if (res < 0) res += Math.PI * 2;
            return res;
        }

        function pressKey() {
            if (!isPlaying) return;

            if (gameOver) {
                bgMusic.currentTime = 0;
                bgMusic.play();
                resetGame();
                return;
            }

            let pivotTile = path[pivotIndex];
            let nextTile = path[pivotIndex + 1];

            if (!nextTile) return;

            let targetAngle = Math.atan2(nextTile.y - pivotTile.y, nextTile.x - pivotTile.x);
            let diff = Math.abs(normalizeAngle(currentAngle) - normalizeAngle(targetAngle));
            
            if (diff > Math.PI) diff = (Math.PI * 2) - diff;

            if (diff < HIT_TOLERANCE) {
                pivotIndex++;
                score++;
                isRedPivot = !isRedPivot;
                currentAngle = targetAngle + Math.PI;
                scoreDisplay.innerText = `Score: ${score}`;
            } else {
                gameOver = true;
                bgMusic.pause();
                scoreDisplay.innerText = `GAME OVER! Score: ${score}. Press SPACE to restart.`;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') pressKey();
        });
        window.addEventListener('mousedown', pressKey);
        window.addEventListener('touchstart', pressKey);

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            isPlaying = true;
            bgMusic.currentTime = 0;
            bgMusic.play();
            resetGame();
        });

        function loop() {
            if (isPlaying && !gameOver) {
                currentAngle += ORBIT_SPEED;
            }

            let pivotTile = path[pivotIndex] || {x: 0, y: 0};
            
            camera.x += (pivotTile.x - canvas.width / 4 - camera.x) * 0.1;
            camera.y += (pivotTile.y - canvas.height / 2 - camera.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            path.forEach(tile => {
                ctx.fillRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                ctx.strokeRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
            });

            let orbiterX = pivotTile.x + Math.cos(currentAngle) * TILE_SIZE;
            let orbiterY = pivotTile.y + Math.sin(currentAngle) * TILE_SIZE;

            let redPos = isRedPivot ? pivotTile : { x: orbiterX, y: orbiterY };
            let bluePos = isRedPivot ? { x: orbiterX, y: orbiterY } : pivotTile;

            ctx.beginPath();
            ctx.arc(pivotTile.x, pivotTile.y, TILE_SIZE, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(redPos.x, redPos.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#44ccff';
            ctx.beginPath();
            ctx.arc(bluePos.x, bluePos.y, 15, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
            requestAnimationFrame(loop);
        }

        resetGame();
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
