<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire & Ice - Multi-Hit Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            pointer-events: none;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 0 0 10px white;
        }
        p {
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="statusDisplay">PRESS SPACE TO START</h1>
        <p id="scoreDisplay"></p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('statusDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const TILE_SIZE = 60;
        let BPM = 120; 
        let BASE_SPEED = (BPM * Math.PI) / 3600;
        let currentSpeed = BASE_SPEED;
        const HIT_TOLERANCE = 0.4;

        let bgMusic = new Audio('track.mp3');
        
        const level1 = [
            'R', 'R', 'R', 'F_U', 'U', 'R', 'S_D', 'D', 'R', 'R', 
            'F_U', 'F_L', 'F_U', 'R', 'R', 'R', 'S_D', 'R', 'U', 'U', 
            'R', 'F_R', 'F_D', 'D', 'D', 'R', 'R', 'U', 'S_R', 'R'
        ];

        let path = [];
        let pivotIndex = 0;
        let currentAngle = Math.PI; 
        let isRedPivot = true; 
        
        let score = 0;
        let camera = { x: 0, y: 0 };
        let gameState = 'READY'; 

        let particles = [];
        let redTrail = [];
        let blueTrail = [];
        const MAX_TRAIL = 15;

        function createExplosion(x, y, color) {
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0,
                    color: color
                });
            }
        }

        function loadLevel(levelData) {
            path = [{ x: 0, y: 0, mod: 'N' }];
            let cx = 0, cy = 0;
            
            levelData.forEach(item => {
                let parts = item.split('_');
                let mod = parts.length > 1 ? parts[0] : 'N';
                let dir = parts.length > 1 ? parts[1] : parts[0];

                if (dir === 'R') cx += TILE_SIZE;
                else if (dir === 'L') cx -= TILE_SIZE;
                else if (dir === 'U') cy -= TILE_SIZE;
                else if (dir === 'D') cy += TILE_SIZE;
                
                path.push({ x: cx, y: cy, mod: mod });
            });
        }

        function resetTrails() {
            particles = [];
            redTrail = [];
            blueTrail = [];
        }

        function resetGame() {
            loadLevel(level1);
            pivotIndex = 0;
            currentAngle = Math.PI;
            isRedPivot = true;
            score = 0;
            currentSpeed = BASE_SPEED;
            resetTrails();
        }

        function normalizeAngle(a) {
            let res = a % (Math.PI * 2);
            if (res < 0) res += Math.PI * 2;
            return res;
        }

        function handleSingleKey() {
            if (gameState === 'READY' || gameState === 'GAMEOVER' || gameState === 'WON') {
                gameState = 'PLAYING';
                resetGame();
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.log("Audio waiting or missing"));
                statusDisplay.innerText = "";
                scoreDisplay.innerText = `Score: ${score}`;
                return;
            }

            if (gameState === 'PLAYING') {
                let pivotTile = path[pivotIndex];
                let nextTile = path[pivotIndex + 1];

                if (!nextTile) {
                    gameState = 'WON';
                    bgMusic.pause();
                    statusDisplay.innerText = "LEVEL COMPLETE! Press SPACE to replay.";
                    return;
                }

                let targetAngle = Math.atan2(nextTile.y - pivotTile.y, nextTile.x - pivotTile.x);
                let diff = Math.abs(normalizeAngle(currentAngle) - normalizeAngle(targetAngle));
                
                if (diff > Math.PI) diff = (Math.PI * 2) - diff;

                if (diff < HIT_TOLERANCE) {
                    createExplosion(nextTile.x, nextTile.y, isRedPivot ? '#44ccff' : '#ff4444');
                    
                    pivotIndex++;
                    score++;
                    isRedPivot = !isRedPivot;
                    currentAngle = targetAngle + Math.PI;
                    
                    let nextMod = path[pivotIndex].mod;
                    if (nextMod === 'F') currentSpeed = BASE_SPEED * 2;
                    else if (nextMod === 'S') currentSpeed = BASE_SPEED * 0.5;
                    else currentSpeed = BASE_SPEED;

                    scoreDisplay.innerText = `Score: ${score}`;
                } else {
                    gameState = 'GAMEOVER';
                    bgMusic.pause();
                    statusDisplay.innerText = "GAME OVER! Press SPACE to restart.";
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                handleSingleKey();
            }
        });

        function loop() {
            if (gameState === 'PLAYING') {
                currentAngle += currentSpeed;
            }

            let pivotTile = path[pivotIndex] || {x:0, y:0};
            
            camera.x += (pivotTile.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (pivotTile.y - canvas.height / 2 - camera.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            path.forEach(tile => {
                if (tile.mod === 'F') ctx.fillStyle = '#ffaa00';
                else if (tile.mod === 'S') ctx.fillStyle = '#00aaff';
                else ctx.fillStyle = '#333';
                
                ctx.fillRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                ctx.strokeRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
            });

            if (path.length > 0) {
                let orbiterX = pivotTile.x + Math.cos(currentAngle) * TILE_SIZE;
                let orbiterY = pivotTile.y + Math.sin(currentAngle) * TILE_SIZE;

                let redPos = isRedPivot ? pivotTile : { x: orbiterX, y: orbiterY };
                let bluePos = isRedPivot ? { x: orbiterX, y: orbiterY } : pivotTile;

                if (gameState === 'PLAYING') {
                    redTrail.push({x: redPos.x, y: redPos.y});
                    blueTrail.push({x: bluePos.x, y: bluePos.y});
                    if (redTrail.length > MAX_TRAIL) redTrail.shift();
                    if (blueTrail.length > MAX_TRAIL) blueTrail.shift();
                }

                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                for (let i = 0; i < redTrail.length; i++) {
                    ctx.strokeStyle = `rgba(255, 68, 68, ${i / MAX_TRAIL})`;
                    if (i === 0) ctx.moveTo(redTrail[i].x, redTrail[i].y);
                    else ctx.lineTo(redTrail[i].x, redTrail[i].y);
                }
                ctx.stroke();

                ctx.beginPath();
                for (let i = 0; i < blueTrail.length; i++) {
                    ctx.strokeStyle = `rgba(68, 204, 255, ${i / MAX_TRAIL})`;
                    if (i === 0) ctx.moveTo(blueTrail[i].x, blueTrail[i].y);
                    else ctx.lineTo(blueTrail[i].x, blueTrail[i].y);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(pivotTile.x, pivotTile.y, TILE_SIZE, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(redPos.x, redPos.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#44ccff';
                ctx.beginPath();
                ctx.arc(bluePos.x, bluePos.y, 15, 0, Math.PI * 2);
                ctx.fill();

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.04;
                    
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    } else {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, 6, 6);
                    }
                }
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        // The Bug Fix: We load an empty level initially so it doesn't crash before you hit start.
        loadLevel([]); 
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
