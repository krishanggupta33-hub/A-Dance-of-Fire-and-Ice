<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire & Ice - Pure One Key</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            text-shadow: 0 0 10px white;
        }
        p {
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="statusDisplay">PRESS SPACE TO START</h1>
        <p id="scoreDisplay"></p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('statusDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const TILE_SIZE = 60;
        let BPM = 120; 
        let ORBIT_SPEED = (BPM * Math.PI) / 3600;
        const HIT_TOLERANCE = 0.4;

        let bgMusic = new Audio('track.mp3');
        
        const level1 = [
            'R', 'R', 'R', 'U', 'U', 'R', 'D', 'D', 'R', 'R', 
            'U', 'L', 'U', 'R', 'R', 'R', 'D', 'R', 'U', 'U', 
            'R', 'R', 'D', 'D', 'D', 'R', 'R', 'U', 'R', 'R'
        ];

        let path = [];
        let pivotIndex = 0;
        let currentAngle = Math.PI; 
        let isRedPivot = true; 
        
        let score = 0;
        let camera = { x: 0, y: 0 };
        
        let gameState = 'READY'; 

        function loadLevel(levelData) {
            path = [{ x: 0, y: 0 }];
            let cx = 0, cy = 0;
            
            levelData.forEach(direction => {
                if (direction === 'R') cx += TILE_SIZE;
                else if (direction === 'L') cx -= TILE_SIZE;
                else if (direction === 'U') cy -= TILE_SIZE;
                else if (direction === 'D') cy += TILE_SIZE;
                
                path.push({ x: cx, y: cy });
            });
        }

        function resetGame() {
            loadLevel(level1);
            pivotIndex = 0;
            currentAngle = Math.PI;
            isRedPivot = true;
            score = 0;
        }

        function normalizeAngle(a) {
            let res = a % (Math.PI * 2);
            if (res < 0) res += Math.PI * 2;
            return res;
        }

        function handleSingleKey() {
            if (gameState === 'READY' || gameState === 'GAMEOVER' || gameState === 'WON') {
                gameState = 'PLAYING';
                resetGame();
                bgMusic.currentTime = 0;
                bgMusic.play();
                statusDisplay.innerText = "";
                scoreDisplay.innerText = `Score: ${score}`;
                return;
            }

            if (gameState === 'PLAYING') {
                let pivotTile = path[pivotIndex];
                let nextTile = path[pivotIndex + 1];

                if (!nextTile) {
                    gameState = 'WON';
                    bgMusic.pause();
                    statusDisplay.innerText = "LEVEL COMPLETE! Press SPACE to replay.";
                    return;
                }

                let targetAngle = Math.atan2(nextTile.y - pivotTile.y, nextTile.x - pivotTile.x);
                let diff = Math.abs(normalizeAngle(currentAngle) - normalizeAngle(targetAngle));
                
                if (diff > Math.PI) diff = (Math.PI * 2) - diff;

                if (diff < HIT_TOLERANCE) {
                    pivotIndex++;
                    score++;
                    isRedPivot = !isRedPivot;
                    currentAngle = targetAngle + Math.PI;
                    scoreDisplay.innerText = `Score: ${score}`;
                } else {
                    gameState = 'GAMEOVER';
                    bgMusic.pause();
                    statusDisplay.innerText = "GAME OVER! Press SPACE to restart.";
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                handleSingleKey();
            }
        });

        function loop() {
            if (gameState === 'PLAYING') {
                currentAngle += ORBIT_SPEED;
            }

            let pivotTile = path[pivotIndex] || {x:0, y:0};
            
            camera.x += (pivotTile.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (pivotTile.y - canvas.height / 2 - camera.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            path.forEach(tile => {
                ctx.fillRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                ctx.strokeRect(tile.x - TILE_SIZE/2, tile.y - TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
            });

            if (path.length > 0) {
                let orbiterX = pivotTile.x + Math.cos(currentAngle) * TILE_SIZE;
                let orbiterY = pivotTile.y + Math.sin(currentAngle) * TILE_SIZE;

                let redPos = isRedPivot ? pivotTile : { x: orbiterX, y: orbiterY };
                let bluePos = isRedPivot ? { x: orbiterX, y: orbiterY } : pivotTile;

                ctx.beginPath();
                ctx.arc(pivotTile.x, pivotTile.y, TILE_SIZE, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(redPos.x, redPos.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#44ccff';
                ctx.beginPath();
                ctx.arc(bluePos.x, bluePos.y, 15, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        loadLevel([{x:0, y:0}]); 
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
